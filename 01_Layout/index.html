<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>resoponsive layout - Yoga Landing page</title>
    <link rel="stylesheet" href="styles.css" />
    <link href="https://cdnjs.cloudflare.com/ajax/libs/remixicon/4.6.0/remixicon.min.css" rel="stylesheet">
  </head>
  <body>
    <nav class="navbar">
      <div class="nav-container">
        <div class="logo">
          <img src="logo.jpg" height="70" width="70" alt="logo" />
          <button class="navbar-toggle">
            <div class="bar"></div>
            <div class="bar"></div>
            <div class="bar"></div>
          </button>
        </div>

        <ul class="navbar-menu">
          <li><a href="#">HOME</a></li>
          <li><a href="#">SERVICE</a></li>
          <li><a href="#">PORTFOLIO</a></li>
          <li><a href="#">CONTACT US</a></li>
        </ul>
      </div>
    </nav>
    <main class="main-container">
     
      <div class="main-content">
        <h2>JOIN OUR CLUB</h2>
        <H1>Yoga For Your Healthy Life</H1>
        <p>Lorem ipsum dolor sit amet consectetur, adipisicing elit. Fuga sunt aliquam asperiores sequi illo m est, ipsam doloribus ex debitis, amet quos nesciunt! Earum esse, </p>
        <button class="booking">BOOK NOW</button>
        <div class="icons">
            <ul>
              <li><a href="#"><i class="ri-facebook-fill"></i></a></li>
              <li><a href="#"><i class="ri-instagram-line"></i></a></li>
              <li><a href="#"><i class="ri-twitter-fill"></i></a></li>
            </ul>
        </div>
      </div>

       <div class="main-image">
          <div class="outer-circle">
            <div class="inner-circle">
             
            </div>
          </div>
          <img src="yoga.png" alt="yoga image">
      </div>
    </main>
    <script>
        const navbar = document.querySelector(".navbar");
        const toggle = document.querySelector(".navbar-toggle");
        const menu = document.querySelector(".navbar-menu");

        toggle.addEventListener("click", () => {
            toggle.classList.toggle("active");
            menu.classList.toggle("active");
            navbar.classList.toggle("active");
        });
    </script>
  </body>
</html>
